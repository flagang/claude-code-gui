<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Claude Code GUI</title>

  <!-- xterm.js CSS -->
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">

  <style>
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --bg-tertiary: #11111b;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #6c7086;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --red: #f38ba8;
      --purple: #cba6f7;
      --border: #313244;
      --radius: 8px;
      --radius-sm: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Title Bar Drag Region ── */
    .titlebar {
      height: 38px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }
    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-left: 68px;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      height: calc(100vh - 38px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 200px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      -webkit-app-region: no-drag;
    }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .session-list-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 80px;
    }
    .session-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .session-item:hover { background: var(--bg-hover); }
    .session-item.active { background: var(--bg-active); }
    .session-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .session-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .session-dot.running { background: var(--green); }
    .session-dot.idle { background: var(--text-muted); }
    .session-dot.history { background: var(--purple); }

    .sidebar-section-title {
      padding: 8px 16px 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    .history-list-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 200px;
      max-height: none;
    }

    .history-item {
      position: relative;
      padding: 10px 30px 10px 10px;
      border-radius: var(--radius);
      transition: background 0.15s;
      margin-bottom: 4px;
      min-height: 44px;
    }
    .history-item:hover { background: var(--bg-hover); }
    .history-item.active { background: var(--bg-active); }
    .history-cwd {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-meta {
      font-size: 10px;
      color: var(--text-muted);
    }
    .history-delete {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0;
      transition: all 0.15s;
      cursor: pointer;
    }
    .history-item:hover .history-delete {
      opacity: 1;
    }
    .history-delete:hover {
      background: var(--red);
      color: white;
    }

    .history-title {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-left: 18px;
      position: relative;
    }

    .history-model-dot {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    .history-cwd {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Project Grouping (二级菜单) ── */
    .project-group {
      margin-bottom: 4px;
    }
    .project-header {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      border: 1px solid transparent;
    }
    .project-header:hover {
      background: var(--bg-hover);
    }
    .project-header.selected {
      background: var(--bg-active);
      border-color: var(--accent);
    }
    .project-header.selected .project-name {
      color: var(--accent);
    }
    .project-toggle {
      font-size: 10px;
      color: var(--text-muted);
      margin-right: 6px;
      transition: transform 0.15s;
      width: 12px;
    }
    .project-group.collapsed .project-toggle {
      transform: rotate(-90deg);
    }
    .project-group.expanded .project-toggle {
      transform: rotate(0deg);
    }
    .project-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-count {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-hover);
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }
    .project-sessions {
      padding-left: 12px;
      overflow: hidden;
    }
    .project-group.collapsed .project-sessions {
      display: none;
    }
    .project-group.expanded .project-sessions {
      display: block;
    }

    .sidebar-footer {
      padding: 8px;
      border-top: 1px solid var(--border);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-tertiary);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger {
      background: transparent;
      color: var(--red);
    }
    .btn-danger:hover { background: rgba(243, 139, 168, 0.1); }
    .btn-full { width: 100%; }

    .btn-icon {
      width: 30px;
      height: 30px;
      padding: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Main Content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Tab Bar ── */
    .tabbar {
      display: flex;
      align-items: center;
      height: 38px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      -webkit-app-region: no-drag;
    }
    .tabs {
      display: flex;
      gap: 2px;
      flex: 1;
      overflow-x: auto;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      width: 150px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .tab:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .tab.active {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .tab-close {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0;
      transition: all 0.15s;
    }
    .tab:hover .tab-close { opacity: 1; }
    .tab-close:hover { background: var(--bg-active); color: var(--text-primary); }

    .tabbar-actions {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }

    /* ── Terminal Area ── */
    .terminal-area {
      flex: 1;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .terminal-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 4px;
    }
    .terminal-container .xterm {
      height: 100%;
    }
    .terminal-placeholder {
      text-align: center;
      color: var(--text-muted);
    }
    .terminal-placeholder-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .terminal-placeholder h3 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .terminal-placeholder p {
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 12px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border);
      -webkit-app-region: no-drag;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toolbar-separator {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }
    .toolbar-spacer { flex: 1; }

    /* ── Model Selector ── */
    .model-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      background: var(--bg-hover);
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
    }
    .model-selector:hover { background: var(--bg-active); color: var(--text-primary); }
    .model-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .model-dot.opus { background: var(--purple); }
    .model-dot.sonnet { background: var(--accent); }
    .model-dot.haiku { background: var(--green); }

    /* ── Status Bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      height: 24px;
      padding: 0 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      gap: 12px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-container {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .modal-container.modal-small {
      max-width: 480px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    /* ── Provider List Item ── */
    .provider-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      background: var(--bg-secondary);
      transition: all 0.15s;
    }
    .provider-item.active {
      border-color: var(--accent);
      background: var(--bg-hover);
    }
    .provider-item-info {
      flex: 1;
    }
    .provider-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .provider-item-meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .provider-item-actions {
      display: flex;
      gap: 4px;
    }
    .provider-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      background: var(--text-muted);
    }
    .provider-item.active .provider-dot {
      background: var(--green);
    }

    /* ── Form Groups ── */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    /* ── Model Dropdown ── */
    .model-dropdown {
      position: absolute;
      bottom: 50px;
      left: 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      min-width: 200px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 100;
    }
    .model-dropdown.active {
      display: block;
    }
    .model-dropdown-item {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s;
    }
    .model-dropdown-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .model-dropdown-item.active {
      background: var(--bg-active);
      color: var(--text-primary);
    }
    .model-dropdown-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    .model-dropdown-provider {
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      background: var(--bg-secondary);
    }
  </style>
</head>
<body>

  <!-- Title Bar -->
  <div class="titlebar">
    <span class="titlebar-title">Claude Code GUI</span>
  </div>

  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>History</h2>
      </div>
      <div class="history-list-container">
        <div class="history-list">
          <!-- Dynamic history items will be added here -->
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-primary btn-full">+ New Session</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <!-- Tab Bar -->
      <div class="tabbar">
        <div class="tabs">
          <!-- Dynamic tabs will be added here -->
        </div>
        <div class="tabbar-actions">
          <button class="btn-icon" title="New Tab">+</button>
        </div>
      </div>

      <!-- Terminal Area -->
      <div class="terminal-area">
        <div class="terminal-placeholder">
          <div class="terminal-placeholder-icon">&gt;_</div>
          <h3>Terminal Ready</h3>
          <p>Select a session or create a new one to begin</p>
          <button class="btn btn-primary">Start Session</button>
        </div>
        <!-- Terminal containers will be dynamically added here -->
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn-icon" title="Clear">&#9881;</button>
          <button class="btn-icon" title="Compact">&#8644;</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <div class="model-selector" id="model-selector">
            <span class="model-dot sonnet"></span>
            <span>Sonnet</span>
          </div>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button class="btn-icon" title="Help">&#8253;</button>
          <button class="btn-icon" title="Config" id="open-config-btn">&#9881;</button>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-group">
          <button class="btn btn-ghost" title="Command Palette">&#8984;K</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <div class="status-item">
      <span class="status-dot"></span>
      Ready
    </div>
    <div class="status-item">~</div>
    <div class="status-item">v0.1.0</div>
  </div>

  <!-- xterm.js -->
  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>

  <!-- Provider Configuration Modal -->
  <div class="modal-overlay" id="provider-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3>AI 供应商配置</h3>
        <button class="btn-icon modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="provider-list" id="provider-list">
          <!-- Dynamic provider items -->
        </div>
        <button class="btn btn-primary" id="add-provider-btn" style="margin-top: 12px;">+ 添加供应商</button>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancel-provider">取消</button>
        <button class="btn btn-primary" id="save-provider">保存</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Provider Form Modal -->
  <div class="modal-overlay" id="provider-form-modal">
    <div class="modal-container modal-small">
      <div class="modal-header">
        <h3 id="provider-form-title">添加供应商</h3>
        <button class="btn-icon modal-close-form">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>名称</label>
          <input type="text" id="provider-name" placeholder="Anthropic Official">
        </div>
        <div class="form-group">
          <label>API Key / Auth Token</label>
          <input type="password" id="provider-apiKey" placeholder="sk-xxxxxx">
        </div>
        <div class="form-group">
          <label>Base URL</label>
          <input type="text" id="provider-baseUrl" placeholder="https://api.anthropic.com">
        </div>
        <div class="form-group">
          <label>默认模型</label>
          <input type="text" id="provider-defaultModel" placeholder="claude-3-5-sonnet-latest">
        </div>
        <div class="form-group">
          <label>模型列表（一行一个）</label>
          <textarea id="provider-models" placeholder="claude-3-5-sonnet-latest&#10;claude-3-opus-latest&#10;claude-3-haiku-latest"></textarea>
        </div>

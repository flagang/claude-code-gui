<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Claude Code GUI</title>

  <!-- xterm.js CSS -->
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">

  <style>
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --bg-tertiary: #11111b;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #6c7086;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --red: #f38ba8;
      --purple: #cba6f7;
      --border: #313244;
      --radius: 8px;
      --radius-sm: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Title Bar Drag Region ── */
    .titlebar {
      height: 38px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }
    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-left: 68px;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      height: calc(100vh - 38px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 200px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      -webkit-app-region: no-drag;
    }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .session-item {
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .session-item:hover { background: var(--bg-hover); }
    .session-item.active { background: var(--bg-active); }
    .session-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 11px;
      color: var(--text-muted);
    }
    .session-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .session-dot.running { background: var(--green); }
    .session-dot.idle { background: var(--text-muted); }

    .sidebar-footer {
      padding: 8px;
      border-top: 1px solid var(--border);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-tertiary);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger {
      background: transparent;
      color: var(--red);
    }
    .btn-danger:hover { background: rgba(243, 139, 168, 0.1); }
    .btn-full { width: 100%; }

    .btn-icon {
      width: 30px;
      height: 30px;
      padding: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Main Content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ── Tab Bar ── */
    .tabbar {
      display: flex;
      align-items: center;
      height: 38px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      -webkit-app-region: no-drag;
    }
    .tabs {
      display: flex;
      gap: 2px;
      flex: 1;
      overflow-x: auto;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      max-width: 180px;
    }
    .tab:hover { background: var(--bg-hover); color: var(--text-secondary); }
    .tab.active {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .tab-close {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0;
      transition: all 0.15s;
    }
    .tab:hover .tab-close { opacity: 1; }
    .tab-close:hover { background: var(--bg-active); color: var(--text-primary); }

    .tabbar-actions {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }

    /* ── Terminal Area ── */
    .terminal-area {
      flex: 1;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .terminal-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 4px;
    }
    .terminal-container .xterm {
      height: 100%;
    }
    .terminal-placeholder {
      text-align: center;
      color: var(--text-muted);
    }
    .terminal-placeholder-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    .terminal-placeholder h3 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .terminal-placeholder p {
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 12px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border);
      -webkit-app-region: no-drag;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toolbar-separator {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }
    .toolbar-spacer { flex: 1; }

    /* ── Model Selector ── */
    .model-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      background: var(--bg-hover);
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
    }
    .model-selector:hover { background: var(--bg-active); color: var(--text-primary); }
    .model-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .model-dot.opus { background: var(--purple); }
    .model-dot.sonnet { background: var(--accent); }
    .model-dot.haiku { background: var(--green); }

    /* ── Status Bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      height: 24px;
      padding: 0 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      gap: 12px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

  <!-- Title Bar -->
  <div class="titlebar">
    <span class="titlebar-title">Claude Code GUI</span>
  </div>

  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Sessions</h2>
      </div>
      <div class="session-list">
        <!-- Dynamic session items will be added here -->
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-primary btn-full">+ New Session</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <!-- Tab Bar -->
      <div class="tabbar">
        <div class="tabs">
          <!-- Dynamic tabs will be added here -->
        </div>
        <div class="tabbar-actions">
          <button class="btn-icon" title="New Tab">+</button>
        </div>
      </div>

      <!-- Terminal Area -->
      <div class="terminal-area">
        <div class="terminal-placeholder">
          <div class="terminal-placeholder-icon">&gt;_</div>
          <h3>Terminal Ready</h3>
          <p>Select a session or create a new one to begin</p>
          <button class="btn btn-primary">Start Session</button>
        </div>
        <!-- Terminal containers will be dynamically added here -->
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="btn-icon" title="Clear">&#9881;</button>
          <button class="btn-icon" title="Compact">&#8644;</button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <div class="model-selector" id="model-selector">
            <span class="model-dot sonnet"></span>
            <span>Sonnet</span>
          </div>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
          <button class="btn-icon" title="Help">&#8253;</button>
          <button class="btn-icon" title="Config">&#9881;</button>
        </div>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-group">
          <button class="btn btn-ghost" title="Command Palette">&#8984;K</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <div class="status-item">
      <span class="status-dot"></span>
      Ready
    </div>
    <div class="status-item">~</div>
    <div class="status-item">v0.1.0</div>
  </div>

  <!-- xterm.js -->
  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <!-- Renderer app -->
  <script src="src/renderer/app.js"></script>

</body>
</html>
